<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5a5a5a" />
  <title>ITE vote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eceff1;
      --card: #fff;
      --header: #5a5a5a;
      --accent: #2e7d32;
      --live: #c62828;
      --muted: #888;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: Montserrat, Segoe UI, sans-serif;
      background: var(--bg);
      color: #222;
    }
    .topbar {
      background: var(--header);
      color: #fff;
      padding: 0.65rem 1rem;
      font-weight: 600;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .live-pill {
      background: var(--live);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      animation: pulse 2s ease-in-out infinite;
    }
    .live-pill.off { background: #757575; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    .wrap {
      padding: 0.75rem;
      max-width: 560px;
      margin: 0 auto;
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
    }
    .banner {
      display: none;
      background: linear-gradient(90deg, #e8f5e9, #fff);
      border: 1px solid #a5d6a7;
      color: #1b5e20;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      margin-bottom: 0.75rem;
      text-align: center;
      animation: bannerIn 0.45s ease;
    }
    .banner.show { display: block; }
    @keyframes bannerIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      overflow: hidden;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }
    .card.pop {
      animation: cardPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes cardPop {
      0% { transform: scale(0.96); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    .card-head {
      padding: 0.6rem 1rem;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      font-size: 0.8rem;
      color: #555;
      font-weight: 600;
    }
    .stem {
      padding: 1rem;
      font-size: 0.95rem;
      line-height: 1.45;
      max-height: 42vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .choices { padding: 0 0.75rem 0.75rem; display: flex; flex-direction: column; gap: 0.45rem; }
    button.choice {
      font-family: inherit;
      text-align: left;
      padding: 0.85rem 0.9rem;
      border: 2px solid #cfd8dc;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-size: 0.88rem;
      line-height: 1.35;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    button.choice:active:not(:disabled) { transform: scale(0.99); }
    button.choice:hover:not(:disabled) {
      border-color: var(--accent);
      background: #e8f5e9;
    }
    button.choice:disabled { opacity: 0.55; cursor: default; }
    .letter {
      display: inline-block;
      font-weight: 700;
      color: var(--header);
      min-width: 1.5rem;
    }
    .status {
      text-align: center;
      color: var(--muted);
      padding: 2.5rem 1rem;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .status strong { color: #555; }
    .sent {
      color: var(--accent);
      font-weight: 600;
      padding: 0.75rem 1rem;
      text-align: center;
      font-size: 0.9rem;
      border-top: 1px solid #eee;
    }
    .hint { font-size: 0.8rem; color: #777; margin-top: 1rem; text-align: center; }
  </style>
</head>
<body>
  <div class="topbar">
    <span>ITE live vote</span>
    <span id="live-pill" class="live-pill off">STANDBY</span>
  </div>
  <div class="wrap">
    <div id="banner" class="banner">New question — vote now</div>
    <div id="panel-vote" style="display:none">
      <div id="card" class="card">
        <div id="card-head" class="card-head"></div>
        <div id="stem" class="stem"></div>
        <div id="choices" class="choices"></div>
        <div id="sent" class="sent" style="display:none"></div>
      </div>
      <p class="hint">You do not need to swipe — the question updates when the presenter starts each poll.</p>
    </div>
    <div id="panel-wait">
      <div id="status" class="status">
        <strong>Stay on this page.</strong><br />
        When the presenter opens a poll, the question will appear here automatically.
      </div>
    </div>
  </div>
  <script>
    const stemEl = document.getElementById('stem');
    const choicesEl = document.getElementById('choices');
    const statusEl = document.getElementById('status');
    const sentEl = document.getElementById('sent');
    const panelVote = document.getElementById('panel-vote');
    const panelWait = document.getElementById('panel-wait');
    const cardEl = document.getElementById('card');
    const cardHeadEl = document.getElementById('card-head');
    const bannerEl = document.getElementById('banner');
    const livePill = document.getElementById('live-pill');

    let byPoll = {};
    let activePoll = null;
    let votingOpen = false;
    let activeQuestion = null;
    /** @type {Set<string>} */
    const votedPollIds = new Set();
    let lastPopPollId = null;
    let ws = null;

    function wsUrl() {
      const p = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      return p + '//' + window.location.host + '/ws';
    }

    function currentQuestion() {
      if (activeQuestion && activeQuestion.stem) return activeQuestion;
      if (activePoll && byPoll[activePoll]) return byPoll[activePoll];
      return null;
    }

    function applyState(msg) {
      if (msg.active_poll !== undefined) activePoll = msg.active_poll;
      if (msg.voting_open !== undefined) votingOpen = !!msg.voting_open;
      if (msg.question !== undefined) activeQuestion = msg.question;
      if (msg.active_question !== undefined) activeQuestion = msg.active_question;
      render();
    }

    function showBanner() {
      bannerEl.classList.add('show');
      setTimeout(function () { bannerEl.classList.remove('show'); }, 2800);
    }

    function maybePopAndHaptic(pid) {
      if (!votingOpen || !pid) return;
      if (pid === lastPopPollId) return;
      lastPopPollId = pid;
      cardEl.classList.remove('pop');
      void cardEl.offsetWidth;
      cardEl.classList.add('pop');
      showBanner();
      if (navigator.vibrate) navigator.vibrate(40);
    }

    function render() {
      const q = currentQuestion();
      const showVote = votingOpen && activePoll && q;

      if (votingOpen && activePoll && q) {
        maybePopAndHaptic(activePoll);
      }

      if (!showVote) {
        panelVote.style.display = 'none';
        panelWait.style.display = 'block';
        livePill.textContent = 'STANDBY';
        livePill.classList.add('off');
        if (votingOpen === false && activePoll) {
          statusEl.innerHTML = '<strong>Poll closed.</strong><br />Look at the main screen for results and discussion.';
        } else {
          statusEl.innerHTML =
            '<strong>Stay on this page.</strong><br />When the presenter opens a poll, the question will appear here automatically.';
        }
        return;
      }

      panelVote.style.display = 'block';
      panelWait.style.display = 'none';
      livePill.textContent = 'LIVE';
      livePill.classList.remove('off');

      cardHeadEl.textContent =
        'Question ' + (q.number != null ? q.number : '') + (q.year ? ' (' + q.year + ')' : '') + ' — tap one answer';

      stemEl.textContent = q.stem || '';

      const letters = q.option_letters || Object.keys(q.options || {}).sort();
      choicesEl.innerHTML = '';
      const voted = votedPollIds.has(activePoll);

      letters.forEach(function (L) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'choice';
        btn.disabled = voted;
        btn.innerHTML = '<span class="letter">' + L + '.</span> ' + (q.options[L] || '');
        btn.addEventListener('click', function () {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'vote', poll_id: activePoll, choice: L }));
            votedPollIds.add(activePoll);
            sentEl.style.display = 'block';
            sentEl.textContent = 'Vote sent — thanks!';
            render();
          }
        });
        choicesEl.appendChild(btn);
      });

      if (voted) {
        sentEl.style.display = 'block';
        sentEl.textContent = 'Vote recorded for this question.';
      } else {
        sentEl.style.display = 'none';
      }
    }

    fetch('/data.json')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        (d.questions || []).forEach(function (q) { byPoll[q.poll_id] = q; });
        return fetch('/api/state');
      })
      .then(function (r) { return r.json(); })
      .then(function (st) {
        applyState(st);
      })
      .catch(function () {
        statusEl.textContent = 'Could not load session. Is the server running?';
      });

    function pollHttp() {
      fetch('/api/state')
        .then(function (r) { return r.json(); })
        .then(function (st) {
          applyState({
            active_poll: st.active_poll,
            voting_open: st.voting_open,
            question: st.active_question,
          });
        })
        .catch(function () {});
    }
    setInterval(pollHttp, 1500);

    function connect() {
      ws = new WebSocket(wsUrl());
      ws.onmessage = function (ev) {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'sync') {
          applyState({
            active_poll: msg.active_poll,
            voting_open: msg.voting_open,
            question: msg.active_question,
          });
        } else if (msg.type === 'active_poll') {
          applyState({
            active_poll: msg.poll_id,
            voting_open: msg.voting_open,
            question: msg.question,
          });
        }
      };
      ws.onclose = function () { setTimeout(connect, 1500); };
    }
    connect();
  </script>
</body>
</html>
